<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Daily Pulse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Nunito+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    /* ── Reset ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      overflow: hidden;
      height: 100dvh;
      font-family: 'Nunito Sans', sans-serif;
      color: #fff;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Loading screen ─────────────────────────────── */
    #loading {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      z-index: 900;
      transition: opacity 0.4s;
    }
    #loading.gone { opacity: 0; pointer-events: none; }
    .ld-logo { display: flex; flex-direction: column; align-items: center; line-height: 1; }
    .ld-daily {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 4px;
      text-transform: uppercase;
      opacity: 0.55;
    }
    .ld-pulse {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 58px;
      text-transform: uppercase;
      letter-spacing: 3px;
    }
    .ld-sub {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: 0.35;
    }

    /* ── Empty state ────────────────────────────────── */
    #empty {
      position: fixed;
      inset: 0;
      background: #000;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      z-index: 50;
    }
    #empty.show { display: flex; }
    #empty h2 {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 34px;
      text-transform: uppercase;
      opacity: 0.6;
    }
    #empty p { font-size: 13px; opacity: 0.35; }

    /* ── Feed ───────────────────────────────────────── */
    #feed {
      width: 100%;
      height: 100dvh;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    #feed::-webkit-scrollbar { display: none; }

    /* ── Card ───────────────────────────────────────── */
    .card {
      width: 100%;
      height: 100dvh;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      position: relative;
      overflow: hidden;
    }

    /* Photo */
    .photo {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      transform: scale(1.05);
      transition: transform 0.9s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .card.visible .photo { transform: scale(1.0); }

    /* Gradient fallbacks — background-image only so background-size/position from .photo are not reset */
    .grad-1 { background-image: linear-gradient(160deg, #0d1b3e 0%, #071028 100%); }
    .grad-2 { background-image: linear-gradient(160deg, #1a0808 0%, #0d0404 100%); }
    .grad-3 { background-image: linear-gradient(160deg, #071a0e 0%, #040d07 100%); }
    .grad-4 { background-image: linear-gradient(160deg, #1a1005 0%, #0d0803 100%); }
    .grad-5 { background-image: linear-gradient(160deg, #0e0520 0%, #070312 100%); }

    /* Scrim — heavy bottom, light top */
    .scrim {
      position: absolute;
      inset: 0;
      z-index: 1;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.45) 0%,
        rgba(0,0,0,0.18) 28%,
        rgba(0,0,0,0.45) 55%,
        rgba(0,0,0,0.84) 78%,
        rgba(0,0,0,0.96) 100%
      );
    }

    /* ── Topbar ─────────────────────────────────────── */
    .topbar {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 10;
      padding: 50px 18px 18px;
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: flex-start;
    }
    .brand { display: flex; flex-direction: column; line-height: 1; }
    .brand-daily {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 3.5px;
      text-transform: uppercase;
      opacity: 0.7;
    }
    .brand-pulse {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 30px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      line-height: 1;
    }
    .topbar-pills { display: flex; flex-direction: column; gap: 5px; align-items: flex-end; }
    .pill {
      background: rgba(0,0,0,0.50);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 5px 13px;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
      letter-spacing: 0.2px;
    }

    /* ── Progress dots ──────────────────────────────── */
    .dots {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 5px;
      align-items: center;
    }
    .dot {
      width: 3px;
      height: 6px;
      background: rgba(255,255,255,0.25);
      border-radius: 3px;
      transition: height 0.3s ease, background 0.3s ease;
    }
    .dot.active {
      height: 22px;
      background: rgba(255,255,255,0.9);
    }

    /* ── Rail ───────────────────────────────────────── */
    .rail {
      position: absolute;
      right: 16px;
      bottom: 150px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 20px;
      align-items: center;
    }
    .rail-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      user-select: none;
      text-decoration: none;
      color: #fff;
      -webkit-tap-highlight-color: transparent;
    }
    .rail-icon {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,0.13);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .rail-label {
      font-size: 10px;
      font-weight: 700;
      opacity: 0.72;
      letter-spacing: 0.2px;
    }

    /* ── Bottom ─────────────────────────────────────── */
    .bottom {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 10;
      padding: 0 18px 38px;
    }
    .meta-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 9px;
      overflow: hidden;
    }
    .cat-badge {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.14);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .meta-sep { opacity: 0.4; flex-shrink: 0; font-size: 12px; }
    .meta-domain {
      font-size: 11px;
      font-weight: 600;
      opacity: 0.6;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex-shrink: 1;
      min-width: 0;
    }
    .meta-time {
      font-size: 11px;
      font-weight: 600;
      opacity: 0.45;
      white-space: nowrap;
      flex-shrink: 0;
      margin-left: auto;
    }
    .headline {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 40px;
      text-transform: uppercase;
      color: #fff;
      text-shadow: 0 2px 14px rgba(0,0,0,0.55);
      line-height: 1.02;
      letter-spacing: 0.4px;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 14px;
    }
    .action-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .stats {
      display: flex;
      gap: 14px;
      font-size: 13px;
      font-weight: 700;
      opacity: 0.82;
    }
    .read-btn {
      display: inline-block;
      background: rgba(255,255,255,0.95);
      color: #000;
      border: none;
      border-radius: 20px;
      padding: 9px 20px;
      font-family: 'Nunito Sans', sans-serif;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.3px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .read-btn:hover { background: #fff; }
    .share-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: transparent;
      color: #fff;
      border: 1.5px solid rgba(255,255,255,0.7);
      border-radius: 20px;
      padding: 9px 18px;
      font-family: 'Nunito Sans', sans-serif;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.3px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Counter ────────────────────────────────────── */
    .counter {
      position: absolute;
      bottom: 42px;
      left: 18px;
      z-index: 20;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      opacity: 0.32;
    }

    /* ── Swipe hint (first card only) ───────────────── */
    .swipe-hint {
      position: absolute;
      bottom: 130px;
      left: 50%;
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      pointer-events: none;
      animation: swipeHintAnim 2.5s ease-in-out 3s both;
    }
    @keyframes swipeHintAnim {
      0%   { opacity: 0;   transform: translateX(-50%) translateY(6px);  }
      18%  { opacity: 0.9; transform: translateX(-50%) translateY(0);    }
      75%  { opacity: 0.8; transform: translateX(-50%) translateY(-22px);}
      100% { opacity: 0;   transform: translateX(-50%) translateY(-30px);}
    }
    .swipe-icon {
      font-size: 22px;
      line-height: 1;
    }
    .swipe-text {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      opacity: 0.75;
    }

    /* ── Toast ──────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: -60px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(20,20,20,0.95);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.12);
      color: #fff;
      padding: 10px 22px;
      border-radius: 24px;
      font-size: 13px;
      font-weight: 700;
      font-family: 'Nunito Sans', sans-serif;
      z-index: 1000;
      pointer-events: none;
      white-space: nowrap;
      transition: bottom 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    #toast.show { bottom: 90px; }

    /* ── Topbar left group ─────────────────────────── */
    .topbar-left {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 10px;
    }

    /* ── Refresh Feed button ────────────────────────── */
    .refresh-btn {
      background: rgba(0,0,0,0.50);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 100px;
      color: rgba(255,255,255,0.9);
      font-family: 'Nunito Sans', sans-serif;
      font-size: 11px;
      font-weight: 700;
      padding: 5px 11px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
    }
    .refresh-btn:disabled {
      opacity: 0.5;
      cursor: default;
    }

    /* ── Gear button ────────────────────────────────── */
    .gear-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.13);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Story summary ──────────────────────────────── */
    .summary {
      font-family: 'Nunito Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: rgba(255,255,255,0.65);
      line-height: 1.45;
      margin-top: 8px;
      margin-bottom: 14px;
    }
    .summary:empty { display: none; }

    /* ── Settings panel ─────────────────────────────── */
    #settings {
      position: fixed;
      inset: 0;
      background: #0a0a0a;
      z-index: 500;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    #settings.open { transform: translateY(0); }

    .settings-header {
      padding: 56px 18px 20px;
    }
    .back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      color: #fff;
      font-family: 'Nunito Sans', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      padding: 0;
      margin-bottom: 20px;
      opacity: 0.8;
      -webkit-tap-highlight-color: transparent;
    }
    .settings-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 32px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      line-height: 1;
      margin-bottom: 6px;
    }
    .settings-sub {
      font-size: 12px;
      font-weight: 600;
      opacity: 0.4;
      letter-spacing: 0.1px;
    }
    .settings-body { padding: 0 18px; }
    .sliders-section { padding-bottom: 10px; }
    .slider-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .slider-row:last-child { border-bottom: none; }
    .slider-label { font-size: 14px; font-weight: 700; min-width: 130px; flex-shrink: 0; }
    .pref-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      border-radius: 4px;
      outline: none;
      cursor: pointer;
    }
    .pref-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
    }
    .pref-slider::-moz-range-thumb {
      width: 20px; height: 20px;
      border-radius: 50%;
      background: #fff;
      border: none;
      cursor: pointer;
    }
    .slider-value { font-size: 15px; font-weight: 800; min-width: 24px; text-align: right; opacity: 0.9; }
    .settings-footer { padding: 24px 18px 48px; }
    .save-btn {
      width: 100%;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 28px;
      font-family: 'Nunito Sans', sans-serif;
      font-size: 15px;
      font-weight: 800;
      padding: 16px 20px;
      cursor: pointer;
      letter-spacing: 0.2px;
      -webkit-tap-highlight-color: transparent;
    }
    .save-hint {
      text-align: center;
      font-size: 11px;
      font-weight: 600;
      opacity: 0.3;
      margin-top: 12px;
      letter-spacing: 0.2px;
    }
  </style>
</head>
<body>

  <div id="loading">
    <div class="ld-logo">
      <span class="ld-daily">daily</span>
      <span class="ld-pulse">PULSE</span>
    </div>
    <div class="ld-sub">Loading stories…</div>
  </div>

  <div id="empty">
    <h2>No Stories Yet</h2>
    <p>Pull to refresh or check back in a few minutes.</p>
  </div>

  <div id="feed"></div>
  <div id="toast"></div>

  <!-- ── Settings panel ─────────────────────────────── -->
  <div id="settings">
    <div class="settings-header">
      <button class="back-btn" onclick="closeSettings()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Back
      </button>
      <div class="settings-title">YOUR FEED PREFERENCES</div>
      <div class="settings-sub">Changes apply to everyone with this URL</div>
    </div>

    <div class="settings-body">
      <div class="sliders-section">
        <div class="slider-row">
          <span class="slider-label">🤖 AI</span>
          <input type="range" class="pref-slider" data-pref="ai"      min="1" max="10" step="1" value="3">
          <span class="slider-value">3</span>
        </div>
        <div class="slider-row">
          <span class="slider-label">💻 Tech</span>
          <input type="range" class="pref-slider" data-pref="tech"    min="1" max="10" step="1" value="3">
          <span class="slider-value">3</span>
        </div>
        <div class="slider-row">
          <span class="slider-label">💰 Finance</span>
          <input type="range" class="pref-slider" data-pref="finance" min="1" max="10" step="1" value="3">
          <span class="slider-value">3</span>
        </div>
        <div class="slider-row">
          <span class="slider-label">🌍 Geopolitics</span>
          <input type="range" class="pref-slider" data-pref="geo"     min="1" max="10" step="1" value="3">
          <span class="slider-value">3</span>
        </div>
        <div class="slider-row">
          <span class="slider-label">⚽ Sports</span>
          <input type="range" class="pref-slider" data-pref="sports"  min="1" max="10" step="1" value="3">
          <span class="slider-value">3</span>
        </div>
        <div class="slider-row">
          <span class="slider-label">🔬 Science</span>
          <input type="range" class="pref-slider" data-pref="science" min="1" max="10" step="1" value="3">
          <span class="slider-value">3</span>
        </div>
        <div class="slider-row">
          <span class="slider-label">🏥 Health</span>
          <input type="range" class="pref-slider" data-pref="health"  min="1" max="10" step="1" value="3">
          <span class="slider-value">3</span>
        </div>
        <div class="slider-row">
          <span class="slider-label">🌱 Climate</span>
          <input type="range" class="pref-slider" data-pref="climate" min="1" max="10" step="1" value="3">
          <span class="slider-value">3</span>
        </div>
      </div>
    </div>

    <div class="settings-footer">
      <button class="save-btn" onclick="savePrefs()">Save &amp; Refresh Feed</button>
      <p class="save-hint">Your feed will update within 2 minutes</p>
    </div>
  </div>

  <script>
    'use strict';

    /* ── Category badge colours ─────────────────────────── */
    const CAT_COLORS = {
      'AI':      'rgba(99,102,241,0.6)',
      'Tech':    'rgba(14,165,233,0.6)',
      'Finance': 'rgba(16,185,129,0.6)',
      'Geo':     'rgba(245,158,11,0.6)',
      'Sports':  'rgba(239,68,68,0.6)',
      'Science': 'rgba(168,85,247,0.6)',
      'Health':  'rgba(236,72,153,0.6)',
      'Climate': 'rgba(34,197,94,0.6)',
    };

    /* ── Category detection ─────────────────────────────── */
    function detectCategory(domain, title) {
      const d = (domain || '').toLowerCase();
      const t = ' ' + (title || '').toLowerCase() + ' ';

      const aiDomains    = ['openai', 'anthropic', 'deepmind', 'huggingface', 'mistral'];
      const aiKeywords   = [' ai ', ' llm', 'model', 'gpt', 'claude', 'gemini', 'neural', 'machine learning'];
      if (aiDomains.some(k => d.includes(k)) || aiKeywords.some(k => t.includes(k))) return '🤖 AI';

      const finDomains   = ['wsj', 'bloomberg', 'ft.com', 'coindesk', 'reuters'];
      const finKeywords  = ['market', 'stock', 'rate', 'inflation', 'fed ', 'bank', 'crypto', 'bitcoin'];
      if (finDomains.some(k => d.includes(k)) || finKeywords.some(k => t.includes(k))) return '💰 Finance';

      const geoKeywords  = ['war', 'election', 'government', 'president', 'minister', 'nato', 'sanctions', 'treaty', 'summit'];
      if (geoKeywords.some(k => t.includes(k))) return '🌍 Geo';

      const sprDomains   = ['espn', 'bbc sport', 'skysports', 'nba.com', 'nfl.com', 'fifa.com'];
      const sprKeywords  = ['nba', 'nfl', 'fifa', 'championship', 'playoffs', 'match', 'tournament', 'cup'];
      if (sprDomains.some(k => d.includes(k)) || sprKeywords.some(k => t.includes(k))) return '⚽ Sports';

      return '💻 Tech';
    }

    /* ── Time-ago ───────────────────────────────────────── */
    function timeAgo(ts) {
      const s = Math.floor(Date.now() / 1000) - ts;
      if (s < 60) return 'just now';
      const m = Math.floor(s / 60);
      if (m < 60) return `${m}m ago`;
      const h = Math.floor(m / 60), rm = m % 60;
      if (h < 24) return rm > 0 ? `${h}h ${rm}m ago` : `${h}h ago`;
      return `${Math.floor(h / 24)}d ago`;
    }

    /* ── Weather code → emoji ───────────────────────────── */
    function weatherEmoji(code) {
      if (code === 0)                       return '☀️';
      if (code >= 1  && code <= 3)          return '⛅';
      if (code >= 45 && code <= 48)         return '🌫️';
      if (code >= 51 && code <= 67)         return '🌧️';
      if (code >= 71 && code <= 77)         return '❄️';
      if (code >= 80 && code <= 82)         return '🌦️';
      if (code >= 95 && code <= 99)         return '⛈️';
      return '🌡️';
    }

    /* ── Inline SVG icons ───────────────────────────────── */
    const ICO_BOOKMARK = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>`;
    const ICO_SHARE    = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>`;
    const ICO_COMMENT  = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`;
    const ICO_GEAR     = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>`;

    /* ── Helpers ────────────────────────────────────────── */
    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function safeUrl(url, fallback = '#') {
      if (!url) return fallback;
      try {
        const { protocol } = new URL(url);
        return (protocol === 'http:' || protocol === 'https:') ? url : fallback;
      } catch { return fallback; }
    }

    function fmtCount(n) {
      return n > 999 ? `${(n / 1000).toFixed(1)}k` : String(n);
    }

    function datePillText() {
      const now = new Date();
      const day  = now.toLocaleDateString('en-US', { weekday: 'long' });
      const date = now.toLocaleDateString('en-US', { month: 'long', day: 'numeric' });
      return `${day}, ${date}`;
    }

    function dotsHTML(activeIdx) {
      let h = '';
      for (let i = 0; i < 6; i++) {
        h += `<div class="dot${i === activeIdx ? ' active' : ''}"></div>`;
      }
      return h;
    }

    /* ── Build one card's HTML ──────────────────────────── */
    function buildCard(story, idx, total) {
      const cat      = story.category || detectCategory(story.domain, story.title);
      const catKey   = cat.split(' ')[1];
      const catColor = CAT_COLORS[catKey] || 'rgba(255,255,255,0.15)';

      const activeDotsIdx = Math.round((idx / Math.max(total - 1, 1)) * 5);
      const ago           = timeAgo(story.time);
      const domain        = esc(story.domain || 'news.ycombinator.com');
      const scoreStr      = fmtCount(story.score);
      const commentsStr   = fmtCount(story.comments || 0);
      const storyHref     = esc(safeUrl(story.url, `https://news.ycombinator.com/item?id=${story.id}`));
      const hnHref        = `https://news.ycombinator.com/item?id=${story.id}`;

      return `
<div class="card" data-index="${idx}">
  <div class="photo grad-${story.gradient}" data-img="${story.image || ''}"></div>
  <div class="scrim"></div>

  <div class="topbar">
    <div class="topbar-left">
      <button class="gear-btn" aria-label="Settings" onclick="openSettings()">${ICO_GEAR}</button>
      <div class="brand">
        <span class="brand-daily">daily</span>
        <span class="brand-pulse">PULSE</span>
      </div>
    </div>
    <div class="topbar-pills">
      <div class="pill weather-pill">📍 Enable location</div>
      <div class="pill date-pill">${esc(datePillText())}</div>
      <button class="refresh-btn" onclick="refreshFeed()">⟳ Refresh</button>
    </div>
  </div>

  <div class="dots">${dotsHTML(activeDotsIdx)}</div>

  <div class="bottom">
    <div class="meta-row">
      <span class="cat-badge" style="background:${catColor}">${cat}</span>
      <span class="meta-sep">·</span>
      <span class="meta-domain">${domain}</span>
      <span class="meta-time">${esc(ago)}</span>
    </div>
    <div class="headline">${esc(story.title)}</div>
    <div class="summary">${esc(story.summary || '')}</div>
    <div class="action-row">
      <a class="read-btn" href="${storyHref}" target="_blank" rel="noopener noreferrer">Read →</a>
      <button class="share-btn" data-action="share" data-url="${storyHref}" data-title="${esc(story.title)}">↑ Share</button>
    </div>
  </div>

  <div class="counter">${idx + 1} / ${total}</div>

  ${idx === 0 ? `
  <div class="swipe-hint">
    <div class="swipe-icon">↑</div>
    <div class="swipe-text">Swipe Up</div>
  </div>` : ''}
</div>`;
    }

    /* ── Render feed ────────────────────────────────────── */
    function renderFeed(stories) {
      const feed = document.getElementById('feed');
      if (!stories.length) {
        document.getElementById('empty').classList.add('show');
        return;
      }
      document.getElementById('empty').classList.remove('show');
      feed.innerHTML = stories.map((s, i) => buildCard(s, i, stories.length)).join('');
      document.querySelectorAll('.photo').forEach(el => {
        const img = el.dataset.img;
        if (img) {
          el.style.backgroundImage = `url("${img}")`;
          el.style.backgroundSize = 'cover';
          el.style.backgroundPosition = 'center';
        }
      });
      document.querySelectorAll('.photo').forEach((el, i) => {
        console.log(`Card ${i} background:`, el.style.backgroundImage);
      });
      setupObserver();
      setupRailHandlers();
    }

    /* ── IntersectionObserver ───────────────────────────── */
    let observer;
    function setupObserver() {
      if (observer) observer.disconnect();
      observer = new IntersectionObserver(entries => {
        entries.forEach(e => e.target.classList.toggle('visible', e.isIntersecting));
      }, { threshold: 0.6 });
      document.querySelectorAll('.card').forEach(c => observer.observe(c));
    }

    /* ── Share button handlers ──────────────────────────── */
    function setupRailHandlers() {
      document.querySelectorAll('[data-action="share"]').forEach(btn => {
        btn.addEventListener('click', () => {
          const { url, title } = btn.dataset;
          if (navigator.share) {
            navigator.share({ title, url }).catch(() => {});
          } else {
            copyToClipboard(url, 'Link copied!');
          }
        });
      });
    }

    function copyToClipboard(text, msg) {
      if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(() => showToast(msg));
      } else {
        showToast('Copy not available');
      }
    }

    /* ── Toast ──────────────────────────────────────────── */
    let toastTimer;
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
    }

    /* ── Weather ────────────────────────────────────────── */
    async function loadWeather() {
      try {
        const pos = await new Promise((resolve, reject) =>
          navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 10000 })
        );
        const { latitude: lat, longitude: lon } = pos.coords;

        const [wRes, gRes] = await Promise.all([
          fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`),
          fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`, {
            headers: { 'Accept-Language': 'en' }
          }),
        ]);

        const [wData, gData] = await Promise.all([wRes.json(), gRes.json()]);
        const cw   = wData.current_weather;
        const temp = Math.round(cw.temperature);
        const emoji = weatherEmoji(cw.weathercode);
        const addr = gData.address || {};
        const city = addr.city || addr.town || addr.suburb || addr.county || 'Unknown';

        const txt = `${emoji} ${temp}°C · ${city}`;
        document.querySelectorAll('.weather-pill').forEach(el => { el.textContent = txt; });
      } catch {
        document.querySelectorAll('.weather-pill').forEach(el => { el.textContent = '📍 Enable location'; });
      }
    }

    /* ── Date pill ──────────────────────────────────────── */
    function updateDatePills() {
      const txt = datePillText();
      document.querySelectorAll('.date-pill').forEach(el => { el.textContent = txt; });
    }

    /* ── Load stories.json ──────────────────────────────── */
    async function loadStories(bust = false) {
      const url = bust ? `data/stories.json?t=${Date.now()}` : 'data/stories.json';
      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return await res.json();
      } catch (err) {
        console.error('Failed to load stories:', err);
        return [];
      }
    }

    /* ── Pull-to-refresh ────────────────────────────────── */
    function setupPullToRefresh() {
      const feed = document.getElementById('feed');
      let startY = 0;
      let tracking = false;

      feed.addEventListener('touchstart', e => {
        if (feed.scrollTop === 0) {
          startY = e.touches[0].clientY;
          tracking = true;
        }
      }, { passive: true });

      feed.addEventListener('touchend', async e => {
        if (!tracking) return;
        tracking = false;
        const delta = e.changedTouches[0].clientY - startY;
        if (delta > 80) {
          showToast('Refreshing…');
          const stories = await loadStories(true);
          renderFeed(stories);
          feed.scrollTop = 0;
          loadWeather();
        }
      }, { passive: true });
    }

    /* ── Preferences ────────────────────────────────────── */
    const WORKER_URL  = 'https://daily-pulse-refresh.alabinnexus.workers.dev';

    const TOPICS = [
      { key: 'ai',      label: '🤖 AI'         },
      { key: 'tech',    label: '💻 Tech'        },
      { key: 'finance', label: '💰 Finance'     },
      { key: 'geo',     label: '🌍 Geopolitics' },
      { key: 'sports',  label: '⚽ Sports'      },
      { key: 'science', label: '🔬 Science'     },
      { key: 'health',  label: '🏥 Health'      },
      { key: 'climate', label: '🌱 Climate'     },
    ];

    function updateSliderFill(slider) {
      const pct = ((slider.value - 1) / 9) * 100;
      slider.style.background =
        `linear-gradient(to right, rgba(255,255,255,0.9) ${pct}%, rgba(255,255,255,0.12) ${pct}%)`;
    }

    function populateSliders(prefs) {
      TOPICS.forEach(({ key }) => {
        const slider = document.querySelector(`[data-pref="${key}"]`);
        if (!slider) return;
        slider.value = prefs[key] ?? 3;
        updateSliderFill(slider);
        const valEl = slider.parentElement.querySelector('.slider-value');
        if (valEl) valEl.textContent = slider.value;
      });
    }

    function readPrefsFromSliders() {
      const prefs = {};
      TOPICS.forEach(({ key }) => {
        const el = document.querySelector(`[data-pref="${key}"]`);
        prefs[key] = el ? parseInt(el.value, 10) : 3;
      });
      return prefs;
    }

    async function refreshFeed() {
      const btns = document.querySelectorAll('.refresh-btn');
      btns.forEach(b => { b.textContent = 'Refreshing…'; b.disabled = true; });

      try {
        const res  = await fetch(WORKER_URL, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({}),
        });
        const data = await res.json();

        if (data.ok) {
          showToast('Feed refreshing in ~2 minutes…');
          setTimeout(async () => {
            const stories = await loadStories(true);
            if (stories.length) {
              renderFeed(stories);
              document.getElementById('feed').scrollTop = 0;
              showToast('Feed updated!');
            }
          }, 150000);
        } else {
          showToast('Refresh failed — try again');
        }
      } catch (err) {
        console.error('Refresh error:', err);
        showToast('Refresh failed — check connection');
      } finally {
        setTimeout(() => {
          document.querySelectorAll('.refresh-btn').forEach(b => {
            b.textContent = '⟳ Refresh';
            b.disabled    = false;
          });
        }, 150000);
      }
    }

    function openSettings()  { document.getElementById('settings').classList.add('open');    }
    function closeSettings() { document.getElementById('settings').classList.remove('open'); }

    async function savePrefs() {
      const prefs = readPrefsFromSliders();
      closeSettings();
      showToast('Saving preferences…');
      try {
        const res  = await fetch(WORKER_URL, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ preferences: prefs }),
        });
        const data = await res.json();
        if (data.ok) {
          showToast('Preferences saved. Feed refreshing in ~2 minutes…');
          setTimeout(async () => {
            const stories = await loadStories(true);
            if (stories.length) {
              renderFeed(stories);
              document.getElementById('feed').scrollTop = 0;
              showToast('Feed updated!');
            }
          }, 150000);
        } else {
          showToast('Save failed — check connection');
        }
      } catch (e) {
        console.error('Save error:', e);
        showToast('Save failed — check connection');
      }
    }

    async function initPreferences() {
      const defaultPrefs = { ai:3, tech:3, finance:3, geo:3, sports:3, science:3, health:3, climate:3 };
      try {
        const res   = await fetch('data/preferences.json?t=' + Date.now());
        const prefs = await res.json();
        populateSliders(prefs);
      } catch {
        populateSliders(defaultPrefs);
      }
    }

    /* ── Init ───────────────────────────────────────────── */
    document.addEventListener('DOMContentLoaded', async () => {
      initPreferences();

      const stories = await loadStories(true);
      console.log('Loaded stories:', stories.length);
      console.log('First story image:', stories[0]?.image);

      const loading = document.getElementById('loading');
      loading.classList.add('gone');
      setTimeout(() => { loading.style.display = 'none'; }, 450);

      renderFeed(stories);
      loadWeather();
      updateDatePills();
      setInterval(updateDatePills, 60_000);
      setupPullToRefresh();

      document.querySelectorAll('.pref-slider').forEach(slider => {
        slider.addEventListener('input', () => {
          updateSliderFill(slider);
          const valueEl = slider.parentElement.querySelector('.slider-value');
          if (valueEl) valueEl.textContent = slider.value;
        });
      });
    });
  </script>
</body>
</html>
