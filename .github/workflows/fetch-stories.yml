name: Fetch Stories

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm install

      # Note: pull-prefs.js was intentionally removed from this workflow.
      # Preferences are now written directly to data/preferences.json
      # in this repo by the Cloudflare Worker BEFORE dispatch is triggered.
      # By the time this step runs, data/preferences.json is already
      # up to date with the latest user slider settings.
      # See workers/daily-pulse-refresh.js for the write logic.
      - name: Run agent
        run: node scripts/agent.js
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git diff --quiet data/stories.json || (git add data/stories.json && git commit -m "chore: update stories [skip ci]" && git push)
